name: Build & Release

# Builds the Windows installer, computes checksums, and drafts a GitHub Release
# whenever a version tag (vX.Y.Z) is pushed. The in-app updater downloads the
# ATLAS-Setup-v<version>.exe asset and verifies it against its .sha256 from the
# same release, so BOTH must be attached — this workflow does that.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tag matches app version
        shell: pwsh
        run: |
          $ver = (Select-String -Path src/core/config.py -Pattern '__version__\s*=\s*"([^"]+)"').Matches.Groups[1].Value
          $tag = "${{ github.ref_name }}".TrimStart("v")
          Write-Host "app __version__=$ver  tag=$tag"
          if ($ver -ne $tag) { throw "Tag $tag does not match __version__ $ver" }

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build (icon → exe → installer → checksums)
        run: python build.py
        # build.py runs make_icon → PyInstaller → iscc → stages dist/release/

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true                      # review, then publish manually
          name: "A.T.L.A.S. ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            dist/release/*
