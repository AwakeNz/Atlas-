name: Build & Release

# Builds the Windows installer, computes checksums, and drafts a GitHub Release.
# Two triggers:
#   - push of a vX.Y.Z tag (normal path), or
#   - manual workflow_dispatch with a `version` input (used when the build host
#     can't push tags directly; the release step creates the tag on publish).
# The in-app updater downloads ATLAS-Setup-v<version>.exe and verifies it against
# its .sha256 from the same release, so BOTH must be attached — this does that.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.3.0) — must match src/core/config.py"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve + verify version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $v = "${{ github.event.inputs.version }}".TrimStart("v")
          } else {
            $v = "${{ github.ref_name }}".TrimStart("v")
          }
          $cfg = (Select-String -Path src/core/config.py -Pattern '__version__\s*=\s*"([^"]+)"').Matches.Groups[1].Value
          Write-Host "requested=$v  config=$cfg"
          if ($v -ne $cfg) { throw "Requested version $v does not match __version__ $cfg" }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build (icon → onedir exe → installer → checksums)
        run: python build.py

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true                      # review, then publish manually
          tag_name: v${{ steps.ver.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: "A.T.L.A.S. v${{ steps.ver.outputs.version }}"
          generate_release_notes: true
          files: |
            dist/release/*
