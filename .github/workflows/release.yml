name: Build & Release

# Builds the Windows exe, computes its SHA-256, and publishes a GitHub Release
# whenever a version tag (vX.Y.Z) is pushed. The updater in-app downloads the
# ATLAS.exe asset and verifies it against ATLAS.exe.sha256 from the same
# release, so BOTH assets must be attached — this workflow does that.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write        # needed to create the Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tag matches app version
        shell: pwsh
        run: |
          $ver = (Select-String -Path src/core/config.py -Pattern '__version__\s*=\s*"([^"]+)"').Matches.Groups[1].Value
          $tag = "${{ github.ref_name }}".TrimStart("v")
          Write-Host "app __version__=$ver  tag=$tag"
          if ($ver -ne $tag) { throw "Tag $tag does not match __version__ $ver" }

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: pyinstaller --noconfirm --clean atlas.spec

      - name: Compute SHA-256
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist/ATLAS.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  ATLAS.exe" | Out-File -Encoding ascii dist/ATLAS.exe.sha256
          Write-Host "sha256=$hash"

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true                      # review, then publish manually
          name: "A.T.L.A.S. ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            dist/ATLAS.exe
            dist/ATLAS.exe.sha256
