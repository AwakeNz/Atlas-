<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>A.T.L.A.S.</title>
<link rel="stylesheet" href="fonts.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<!-- Boot: the seismic line draws in L→R, then the wordmark resolves. ≤1.5s. -->
<div id="boot" class="boot">
  <canvas id="bootScope" class="boot-scope" aria-hidden="true"></canvas>
  <div class="boot-word" id="bootWord">A·T·L·A·S</div>
  <div class="boot-sub" id="bootSub">ONLINE</div>
  <div class="boot-skip">press any key to skip</div>
</div>

<main class="hud" id="hud" hidden>
  <header class="topbar pywebview-drag-region">
    <h1 class="wordmark" id="wordmark">A·T·L·A·S</h1>
    <span class="ver" id="ver">v0.2.0</span>
    <span class="topspacer"></span>
    <button class="icon-btn" id="keyBtn" title="API key" aria-label="API key">
      <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path
        d="M7 14a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm2.83-2H21v2h-2v2h-2v-2h-2.17A5 5 0 1 1 9.83 12z"/></svg>
    </button>
    <button class="icon-btn" id="micBtn" title="Mute microphone" aria-label="Toggle microphone">
      <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path id="micPath"
        d="M12 15a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.9V21h2v-2.1A7 7 0 0 0 19 12h-2z"/></svg>
    </button>
  </header>

  <!-- THE signature: seismic voiceline -->
  <section class="scope-wrap">
    <canvas id="scope" aria-label="A.T.L.A.S. status readout"></canvas>
    <div class="statusline">
      <span class="state-label" id="stateLabel">IDLE</span>
      <span class="ticker" id="ticker"></span>
    </div>
  </section>

  <section class="stream-wrap">
    <div class="stream" id="stream" role="log" aria-live="polite"></div>
  </section>

  <!-- collapsible readouts: hidden by default, Tab toggles -->
  <aside class="readouts" id="readouts" hidden aria-label="System readouts">
    <div class="ro"><label>PROVIDER</label><span id="provVal">—</span></div>
    <div class="ro"><label>TOKENS</label><span id="tokVal">0</span></div>
    <div class="ro"><label>CPU</label><span id="cpuVal">0%</span></div>
    <div class="ro"><label>RAM</label><span id="ramVal">0%</span></div>
  </aside>

  <div class="progress" id="progress" hidden>
    <span id="progLabel">INITIALIZING VOICE SYSTEMS</span>
    <div class="progress-bar"><i id="progFill"></i></div>
  </div>

  <div class="update-banner" id="updateBanner" hidden>
    <span id="updateText">UPDATE AVAILABLE</span>
    <button id="updateBtn" class="pill">INSTALL</button>
  </div>

  <!-- API key panel: auto-shown on first run when no key is configured -->
  <div class="keybar" id="keybar" hidden>
    <label class="keylabel" id="keyLabel">Paste your API key to activate A.T.L.A.S.</label>
    <div class="keyrow" id="keyRow">
      <input id="keyInput" type="password" autocomplete="off" spellcheck="false"
             placeholder="AIza… (Gemini) or gsk_… (Groq)" aria-label="API key">
      <button id="keySave" class="pill">SAVE</button>
    </div>
    <div class="keydone" id="keyDone" hidden>
      <span>Key saved. Restart so A.T.L.A.S. can read it.</span>
      <button id="keyRestart" class="pill">RESTART NOW</button>
    </div>
    <span class="keyhint">Free keys: aistudio.google.com/apikey (Gemini) · console.groq.com (Groq)</span>
  </div>

  <footer class="inputbar">
    <span class="prompt">&#10095;</span>
    <input id="entry" type="text" autocomplete="off" spellcheck="false" autofocus
           placeholder="Type a command, or say “Atlas”…" aria-label="Command input">
    <button class="icon-btn small" id="tabBtn" title="Readouts (Tab)" aria-label="Toggle readouts">
      <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path
        d="M3 5h18v2H3zm0 4h12v2H3zm0 4h18v2H3zm0 4h12v2H3z"/></svg>
    </button>
  </footer>
</main>

<!-- confirmation modal -->
<div class="modal-scrim" id="scrim" hidden>
  <div class="modal" role="alertdialog" aria-labelledby="mTitle" aria-describedby="mDetail">
    <div class="modal-head">⚠ CONFIRMATION REQUIRED</div>
    <div class="modal-title" id="mTitle"></div>
    <pre class="modal-detail" id="mDetail"></pre>
    <div class="modal-actions">
      <button id="denyBtn" class="btn deny">DENY <kbd>Esc</kbd></button>
      <button id="allowBtn" class="btn allow">ALLOW</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
